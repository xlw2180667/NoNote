  <line x1="88.5" y1="65" x2="88.5" y2="77" stroke="#C41E1E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92" y1="65" x2="92" y2="76" stroke="#C41E1E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="95" y1="64" x2="95" y2="75" stroke="#C41E1E" stroke-width="2.5" stroke-linecap="round"/>
</svg>
